<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121212;
            color: white;
            font-family: "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #444;
            margin-bottom: 20px;
            background-image: url(https://picsum.photos/200);
            background-size: cover;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .bio {
            color: #aaa;
            margin-bottom: 30px;
            max-width: 400px;
        }
        .links a {
            display: inline-block;
            color: white;
            background: #222;
            padding: 12px 24px;
            margin: 8px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }
        .links a:hover {
            background: #007bff;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

<div class="avatar"></div>
<h1>你的名字</h1>
<div class="bio">这是我的个人主页，一个普通又特别的少年。</div>

<div class="links">
    <a href="https://github.com">GitHub</a>
    <a href="https://qq.com">QQ空间</a>
    <a href="https://bilibili.com">B站</a>
    <a href="https://music.163.com">网易云</a>
</div>

</body>
</html>
